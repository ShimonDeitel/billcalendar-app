name: Billcalendar
options:
  bundleIdPrefix: com.shimondeitel.billcalendar
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Billcalendar:
    type: application
    platform: iOS
    sources:
      - path: Billcalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.billcalendar
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Billcalendar/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  BillcalendarTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BillcalendarTests
      - path: Billcalendar.storekit
    dependencies:
      - target: Billcalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.billcalendar.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  BillcalendarUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BillcalendarUITests
    dependencies:
      - target: Billcalendar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.billcalendar.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Billcalendar:
    build:
      targets:
        Billcalendar: all
        BillcalendarTests: [test]
        BillcalendarUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Billcalendar.storekit
    test:
      config: Debug
      storeKitConfiguration: Billcalendar.storekit
      targets:
        - BillcalendarTests
        - BillcalendarUITests
    archive:
      config: Release
